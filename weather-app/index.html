<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Weather Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-color: #0b1120;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-blue: #0ea5e9;
            --accent-cyan: #00d2ff;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b1120, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header & Search */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .logo span {
            color: var(--accent-cyan);
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 500px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-cyan));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        /* Alerts Section */
        #alert-container {
            margin-bottom: 20px;
            display: none;
        }

        .alert {
            background: rgba(239, 68, 68, 0.2);
            border-left: 4px solid var(--danger);
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .alert i {
            color: var(--danger);
            font-size: 1.5rem;
        }

        /* Main Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Current Weather */
        .current-weather {
            text-align: center;
        }

        .current-weather h2 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .current-weather p {
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .temp {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--text-main), var(--accent-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 5rem;
            color: var(--accent-cyan);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.4));
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .detail-item {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .detail-item i {
            color: var(--primary-blue);
            font-size: 1.2rem;
        }

        /* Analytics Chart */
        .analytics-card {
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-container {
            flex: 1;
            position: relative;
            min-height: 300px;
        }

        /* 7-Day Forecast */
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.02);
            transition: 0.3s;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            background: rgba(14, 165, 233, 0.1);
            border-color: var(--primary-blue);
        }

        .forecast-card h4 {
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .forecast-card i {
            font-size: 2rem;
            color: var(--accent-cyan);
            margin: 15px 0;
        }

        .min-max {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .min-max span:last-child {
            color: var(--text-muted);
        }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 50px;
            font-size: 2rem;
            color: var(--accent-cyan);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; }
            header { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo"><i class="fas fa-cloud-moon-rain"></i> Weather<span>.Adv</span></div>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
                <button class="btn" id="search-btn"><i class="fas fa-search"></i> Search</button>
                <button class="btn" id="location-btn" title="Use My Location"><i class="fas fa-location-arrow"></i></button>
            </div>
        </header>

        <div id="alert-container">
            <div class="alert">
                <i class="fas fa-exclamation-triangle"></i>
                <div>
                    <strong>Weather Alert:</strong>
                    <span id="alert-text">Extreme weather conditions detected in this area.</span>
                </div>
            </div>
        </div>

        <div class="loader" id="loader"><i class="fas fa-spinner fa-spin"></i> Fetching Data...</div>

        <div id="dashboard-content" style="display: none;">
            <div class="dashboard">
                
                <div class="card current-weather">
                    <h2 id="city-name">--</h2>
                    <p id="date-time">--</p>
                    <div class="weather-icon"><i id="current-icon" class="fas fa-cloud"></i></div>
                    <div class="temp"><span id="current-temp">--</span>°C</div>
                    <h3 id="weather-desc" style="color: var(--accent-cyan);">--</h3>
                    
                    <div class="weather-details">
                        <div class="detail-item">
                            <i class="fas fa-tint"></i>
                            <span style="font-size: 0.9rem; color: var(--text-muted);">Humidity</span>
                            <strong id="current-humidity">--%</strong>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-wind"></i>
                            <span style="font-size: 0.9rem; color: var(--text-muted);">Wind</span>
                            <strong id="current-wind">-- km/h</strong>
                        </div>
                    </div>
                </div>

                <div class="card analytics-card">
                    <div class="card-header">
                        <h3>24-Hour Climate Analytics</h3>
                        <i class="fas fa-chart-line" style="color: var(--primary-blue);"></i>
                    </div>
                    <div class="chart-container">
                        <canvas id="hourlyChart"></canvas>
                    </div>
                </div>

            </div>

            <div class="card">
                <div class="card-header" style="margin-bottom: 25px;">
                    <h3>7-Day Forecast</h3>
                </div>
                <div class="forecast-grid" id="forecast-grid">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const cityInput = document.getElementById('city-input');
        const searchBtn = document.getElementById('search-btn');
        const locationBtn = document.getElementById('location-btn');
        const loader = document.getElementById('loader');
        const dashboard = document.getElementById('dashboard-content');
        const alertContainer = document.getElementById('alert-container');
        const alertText = document.getElementById('alert-text');
        
        let climateChart = null; // Store chart instance

        // WMO Weather Interpretation Codes to FontAwesome Icons & Descriptions
        const weatherCodes = {
            0: { desc: 'Clear sky', icon: 'fa-sun' },
            1: { desc: 'Mainly clear', icon: 'fa-sun' },
            2: { desc: 'Partly cloudy', icon: 'fa-cloud-sun' },
            3: { desc: 'Overcast', icon: 'fa-cloud' },
            45: { desc: 'Fog', icon: 'fa-smog' },
            48: { desc: 'Depositing rime fog', icon: 'fa-smog' },
            51: { desc: 'Light drizzle', icon: 'fa-cloud-rain' },
            53: { desc: 'Moderate drizzle', icon: 'fa-cloud-rain' },
            55: { desc: 'Dense drizzle', icon: 'fa-cloud-rain' },
            61: { desc: 'Slight rain', icon: 'fa-cloud-showers-heavy' },
            63: { desc: 'Moderate rain', icon: 'fa-cloud-showers-heavy' },
            65: { desc: 'Heavy rain', icon: 'fa-cloud-showers-heavy' },
            71: { desc: 'Slight snow fall', icon: 'fa-snowflake' },
            73: { desc: 'Moderate snow fall', icon: 'fa-snowflake' },
            75: { desc: 'Heavy snow fall', icon: 'fa-snowflake' },
            95: { desc: 'Thunderstorm', icon: 'fa-bolt' }
        };

        const getWeatherData = (code) => weatherCodes[code] || { desc: 'Unknown', icon: 'fa-cloud' };

        // Fetch Coordinates based on City Name (Geocoding API)
        async function getCoordinates(city) {
            const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`);
            const data = await res.json();
            if (!data.results || data.results.length === 0) throw new Error("City not found");
            return data.results[0];
        }

        // Fetch Weather Data (Open-Meteo API)
        async function getWeather(lat, lon, cityName) {
            dashboard.style.display = 'none';
            alertContainer.style.display = 'none';
            loader.style.display = 'block';

            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&hourly=temperature_2m,relative_humidity_2m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;
                const res = await fetch(url);
                const data = await res.json();
                
                updateUI(data, cityName);
                updateChart(data.hourly);
                
                loader.style.display = 'none';
                dashboard.style.display = 'block';
            } catch (error) {
                loader.style.display = 'none';
                alert("Error fetching weather data. Please try again.");
                console.error(error);
            }
        }

        // Update DOM Elements
        function updateUI(data, cityName) {
            const current = data.current;
            const weatherInfo = getWeatherData(current.weather_code);
            
            // Current Weather Update
            document.getElementById('city-name').innerText = cityName;
            document.getElementById('date-time').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('current-temp').innerText = Math.round(current.temperature_2m);
            document.getElementById('weather-desc').innerText = weatherInfo.desc;
            document.getElementById('current-icon').className = `fas ${weatherInfo.icon}`;
            document.getElementById('current-humidity').innerText = `${current.relative_humidity_2m}%`;
            document.getElementById('current-wind').innerText = `${current.wind_speed_10m} km/h`;

            // Alert Logic (Simulated Advanced Feature: Trigger if wind > 40km/h or Temp > 45 or Thunderstorm)
            if (current.wind_speed_10m > 40 || current.temperature_2m > 45 || current.weather_code === 95) {
                alertContainer.style.display = 'block';
                alertText.innerText = `Warning: Hazardous conditions detected. Current Wind: ${current.wind_speed_10m} km/h, Temp: ${current.temperature_2m}°C.`;
            }

            // 7-Day Forecast Grid Update
            const forecastGrid = document.getElementById('forecast-grid');
            forecastGrid.innerHTML = '';
            
            for (let i = 1; i <= 7; i++) {
                const date = new Date(data.daily.time[i]);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const dailyWeather = getWeatherData(data.daily.weather_code[i]);
                const maxTemp = Math.round(data.daily.temperature_2m_max[i]);
                const minTemp = Math.round(data.daily.temperature_2m_min[i]);

                forecastGrid.innerHTML += `
                    <div class="forecast-card">
                        <h4>${dayName}</h4>
                        <i class="fas ${dailyWeather.icon}"></i>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px;">${dailyWeather.desc}</p>
                        <div class="min-max">
                            <span>${maxTemp}°</span>
                            <span>${minTemp}°</span>
                        </div>
                    </div>
                `;
            }
        }

        // Chart.js Data Visualization
        function updateChart(hourlyData) {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            
            // Get next 24 hours of data
            const times = hourlyData.time.slice(0, 24).map(t => {
                const date = new Date(t);
                return date.getHours() + ':00';
            });
            const temps = hourlyData.temperature_2m.slice(0, 24);
            const humidity = hourlyData.relative_humidity_2m.slice(0, 24);

            if (climateChart) climateChart.destroy(); // Destroy previous chart instance to prevent glitches

            climateChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: times,
                    datasets: [
                        {
                            label: 'Temperature (°C)',
                            data: temps,
                            borderColor: '#00d2ff',
                            backgroundColor: 'rgba(0, 210, 255, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Humidity (%)',
                            data: humidity,
                            borderColor: '#0ea5e9',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            tension: 0.4,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#f8fafc' } }
                    },
                    scales: {
                        x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { 
                            type: 'linear', display: true, position: 'left',
                            ticks: { color: '#00d2ff' }, grid: { color: 'rgba(255,255,255,0.05)' } 
                        },
                        y1: { 
                            type: 'linear', display: true, position: 'right',
                            ticks: { color: '#0ea5e9' }, grid: { drawOnChartArea: false } 
                        }
                    }
                }
            });
        }

        // Event Listeners
        searchBtn.addEventListener('click', async () => {
            const city = cityInput.value.trim();
            if (!city) return;
            try {
                const location = await getCoordinates(city);
                getWeather(location.latitude, location.longitude, `${location.name}, ${location.country}`);
            } catch (error) {
                alert("City not found. Please check your spelling.");
            }
        });

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });

        // HTML5 Geolocation API
        locationBtn.addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        getWeather(lat, lon, "Your Current Location");
                    },
                    (error) => {
                        alert("Location access denied. Please search manually.");
                    }
                );
            } else {
                alert("Geolocation is not supported by your browser.");
            }
        });

        // Initialize default view (Cairo, Egypt)
        getCoordinates('Cairo').then(loc => getWeather(loc.latitude, loc.longitude, loc.name));

    </script>
</body>
</html>
