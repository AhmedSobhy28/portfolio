<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Ahmed Sobhy | BTC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b1120; --card-bg: #1e293b; --accent-cyan: #00d2ff; --text-main: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .contact-container {
            text-align: center; perspective: 1000px;
        }

        .card {
            background: var(--card-bg); padding: 50px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: 0.3s; transform-style: preserve-3d;
        }

        h1 { margin-bottom: 30px; font-size: 2.5rem; }
        h1 span { color: var(--accent-cyan); }

        .links-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        
        .social-link {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding: 20px; background: rgba(0,0,0,0.2); border-radius: 20px;
            text-decoration: none; color: var(--text-main); transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .social-link:hover { 
            background: var(--accent-cyan); color: #000; transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .social-link i { font-size: 2rem; }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="card tilt-card">
            <h1>Let's <span>Connect</span></h1>
            <p>You can reach me through any of the following platforms:</p>
            
            <div class="links-grid">
                <a href="https://wa.me/qr/MST3YDIQAQB4I1" target="_blank" class="social-link"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                <a href="https://www.linkedin.com/in/ahmed-sobhy-mohamed-150643279" target="_blank" class="social-link"><i class="fab fa-linkedin"></i> LinkedIn</a>
                <a href="https://www.facebook.com/share/1CgY3DFGvc/" target="_blank" class="social-link"><i class="fab fa-facebook"></i> Facebook</a>
                <a href="https://www.instagram.com/ahmed.sobhy._?igsh=djVkcGoxcWpmZGtz" target="_blank" class="social-link"><i class="fab fa-instagram"></i> Instagram</a>
            </div>
        </div>
    </div>

    <script>
        // تفعيل الـ 3D Tilt للكرت
        const card = document.querySelector('.card');
        card.addEventListener('mousemove', (e) => {
            const { offsetWidth: width, offsetHeight: height } = card;
            const { offsetX: x, offsetY: y } = e;
            const rotateX = ((y / height) - 0.5) * -20;
            const rotateY = ((x / width) - 0.5) * 20;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        card.addEventListener('mouseleave', () => { card.style.transform = `rotateX(0deg) rotateY(0deg)`; });
    </script>
</body>
</html>
